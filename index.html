<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave Development - Under Construction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0b0f19;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            position: relative;
        }

        .ambient-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .blob {
            position: absolute;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0.1) 100%);
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 12s infinite ease-in-out;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            top: -10%;
            right: 10%;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 500px;
            height: 500px;
            bottom: -15%;
            left: 5%;
            animation-delay: -4s;
        }

        .glass-card {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 550px;
            padding: 3rem 2rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4),
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .logo-container {
            margin-bottom: 2rem;
        }

        .logo {
            max-width: 120px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.6));
            animation: pulse 4s infinite ease-in-out;
        }

        h1 {
            color: #ffffff;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 1rem;
            background: linear-gradient(180deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            font-size: 1.1rem;
            line-height: 1.6;
            font-weight: 400;
        }

        .badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(234, 179, 8, 0.1);
            border: 1px solid rgba(234, 179, 8, 0.3);
            color: #eab308;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.1);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-40px) scale(1.1); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.4)); }
            50% { transform: scale(1.03); filter: drop-shadow(0 0 30px rgba(255, 255, 255, 0.7)); }
        }
    </style>
</head>
<body>

    <div class="ambient-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="glass-card">
        <div class="logo-container">
            <img src="tide.png" alt="Wave Logo" class="logo">
        </div>
        
        <span class="badge">In Progress</span>
        
        <h1>Wave Development</h1>
        <p>Wave Development is currently working on their website! Check back soon for our finalized product!</p>
    </div>

</body>
</html>
